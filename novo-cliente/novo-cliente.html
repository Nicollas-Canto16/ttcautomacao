<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo cliente</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../shared/global.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header
      class="container-fluid text-center m-0 w-100 h-100 rounded-bottom-4"
    >
      <div class="row p-2">
        <div class="col d-flex justify-content-start ps-5">
          <a class="rounded-4 p-1" href="../index.html">
            <img
              class="logoImg"
              src="../assets/img/logotipoPreta.png"
              alt="Logo Completa Versão Preta"
            />
          </a>
        </div>
        <div class="col-6 d-flex justify-content-between align-items-center">
          <a class="headerLink rounded-4 p-1" href="#sobreNos">Sobre nós</a>
          <a class="headerLink rounded-4 p-1" href="#servicos">Serviços</a>
          <a class="headerLink rounded-4 p-1" href="#orcamento">Orçamento </a>
        </div>
        <div class="col d-flex justify-content-end align-items-center pe-5">
          <a class="me-3 rounded-4 p-2 d-flex" href="">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-moon-icon lucide-moon"
            >
              <path
                d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"
              />
            </svg>
          </a>
          <a class="rounded-4 p-2 d-flex" href="">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-user-round-cog-icon lucide-user-round-cog"
            >
              <path d="m14.305 19.53.923-.382" />
              <path d="m15.228 16.852-.923-.383" />
              <path d="m16.852 15.228-.383-.923" />
              <path d="m16.852 20.772-.383.924" />
              <path d="m19.148 15.228.383-.923" />
              <path d="m19.53 21.696-.382-.924" />
              <path d="M2 21a8 8 0 0 1 10.434-7.62" />
              <path d="m20.772 16.852.924-.383" />
              <path d="m20.772 19.148.924.383" />
              <circle cx="10" cy="8" r="5" />
              <circle cx="18" cy="18" r="3" />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="container-fluid p-5">
      <div class="row d-flex pb-5">
        <div class="d-flex">
          <div class="pt-2 pe-2">
            <a class="border border-2 rounded-3 p-1 d-flex" href="">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#173b4b"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-chevron-left-icon lucide-chevron-left"
              >
                <path d="m15 18-6-6 6-6" />
              </svg>
            </a>
          </div>
          <div class="">
            <h1 class="m-0 titlePage">Novo cliente</h1>
            <p class="m-0 subtitlePage">
              Preencha os dados do Cliente e da Ordem de serviço
            </p>
          </div>
        </div>
      </div>
      <div class="row border border-2 p-3 rounded-4 mb-5">
        <h2 class="pb-3">Dados do cliente</h2>
        <form class="" action="">
          <div class="row pb-3">
            <div class="col">
              <label for="name">Nome do responsável*</label>
              <input
                type="text"
                class="form-control"
                placeholder="Nome completo"
                name="name"
                id="name"
              />
            </div>
            <div class="col">
              <label for="companyName">Nome da empresa*</label>
              <input
                type="text"
                class="form-control"
                placeholder="Razão social ou nome fantasia"
                name="companyName"
                id="companyName"
              />
            </div>
          </div>
          <div class="row pb-3">
            <div class="col">
              <label for="email">E-mail*</label>
              <input
                type="text"
                class="form-control"
                placeholder="email@exemplo.com"
                name="email"
                id="email"
              />
            </div>
            <div class="col">
              <label for="phone">Telefone*</label>
              <input
                type="text"
                class="form-control"
                placeholder="(00) 00000-00000"
                name="phone"
                id="phone"
              />
            </div>
          </div>
          <div class="pb-3">
            <label for="locate" class="form-label">Endereço*</label>
            <input
              type="text"
              class="form-control"
              id="locate"
              name="locate"
              placeholder="Rua, número, bairro- Cidade, estado"
            />
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col-3">
              <label for="select">Tipo de documento*</label>
              <select
                class="form-select"
                aria-label="Default select example"
                id="select"
                name="select"
              >
                <option selected>Cnpj</option>
                <option value="1">Cnpj</option>
                <option value="2">Cpf</option>
              </select>
            </div>
            <div class="col-6">
              <label for="document">Cnpj*</label>
              <input
                type="text"
                class="form-control"
                placeholder="00.000.000/0000-00"
                name="cpnj"
                id="cnpj"
              />
            </div>
          </div>
        </form>
      </div>
      <div class="row border border-2 p-3 rounded-4">
        <h2 class="pb-3">Ordem de Serviço</h2>
        <form class="" action="">
          <div class="row pb-3">
            <div class="col-3">
              <label for="status">Status*</label>
              <select
                class="form-select"
                aria-label="Default select example"
                id="status"
                name="status"
              >
                <option selected>Pendente</option>
                <option value="1">Pendente</option>
                <option value="2">Concluído</option>
                <option value="3">Em andamento</option>
              </select>
            </div>
          </div>
          <div class="pb-3">
            <label for="osDescripition" class="form-label"
              >Descrição da ordem de serviço*</label
            >
            <textarea
              class="form-control"
              id="osDescripition"
              name="osDescripition"
              rows="3"
              placeholder="Descrição"
              required
            ></textarea>
          </div>
        </form>
      </div>
      <div class="row pt-5">
        <div class="col d-flex justify-content-end">
          <button class="btn btn-secondary me-3">Cancelar</button>
          <button class="btn btn-primary">Salvar cliente</button>
        </div>
      </div>
    </main>
  </body>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="./script.js"></script>
</html>
